# Local development & preview for the Astro portfolio.
#
#   docker compose up dev         # hot-reloading dev server  -> http://localhost:4321
#   docker compose --profile preview up preview   # production build preview
#
services:
  dev:
    build:
      context: .
      target: dev
    ports:
      - "4321:4321"
    volumes:
      # Mount source for live reload, but keep the container's node_modules
      - .:/app
      - /app/node_modules
    environment:
      - ASTRO_TELEMETRY_DISABLED=1
    command: ["bun", "run", "dev", "--", "--host", "0.0.0.0"]

  preview:
    profiles: ["preview"]
    build:
      context: .
      target: preview
    ports:
      - "4321:4321"
    environment:
      - ASTRO_TELEMETRY_DISABLED=1
